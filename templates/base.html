<!DOCTYPE html>
<html lang="{{ t.lang.code }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ t.site.title }}</title>
    <link rel="stylesheet" href="{{ base_url }}style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.4/css/academicons.min.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="{{ base_url }}">{{ author_name }}</a>
            </div>
            <div class="nav-menu">
                <a href="{{ base_url }}index.html">{{ t.nav.home }}</a>
                <a href="{{ base_url }}publications.html">{{ t.nav.publications }}</a>
                <a href="{{ base_url }}projects.html">{{ t.nav.projects }}</a>
            </div>
            <div class="nav-right">
                <a href="{{ lang_switch_url }}" class="lang-switch" title="{{ t.lang.switch_to }}">{{ t.lang.switch_to }}</a>
                <button id="theme-toggle" class="theme-toggle-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ year }} {{ author_name }}. {{ t.site.rights }}</p>
        </div>
    </footer>

    <script src="{{ base_url }}script.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
